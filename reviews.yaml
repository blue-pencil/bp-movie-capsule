  reviewText: |
   - 개연성에 대한 접근법이 좋고, 거슬리는 부분 없이 전반적인 흐름도 자연스럽다.
   - 감독이 바뀌었지만 찰떡. 비주얼과 색감, 카메라워크는 시리즈 특징을 수렴해서 능가한 느낌. 다만 전투 방식은 훨씬 역동적으로 바뀌었다.
   - 살짝 어이털리는 유머와 중후반 비주얼을 위한 화염쇼는 아쉬운 부분.
  genres: ["액션", "스릴러", "범죄"]

