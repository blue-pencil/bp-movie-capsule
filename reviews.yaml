  reviewText: |
   올해 가장 인상깊은 장편 데뷔작. 자연스러움이 곧 밸런스고, 복잡하지 않게 있는 그대로 보여준다. 배우들의 연기도 놀랄 만큼 뛰어났고.
   현실이자 침식, 무례함, 한때의 일탈, 여러 의미를 담고 있지만 기억에 남는 것은 딱 한 번 나왔던 얼굴의 클로즈업 장면과 이 대사, "뭐가 다른데요?."
  genres: ["드라마"]

