<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>映畵私論 by bluepencil</title>
    <meta name="description" content="블루펜슬의 지극히 사적인 영화 감상 후기.">
    <meta property="og:title" content="映畵私論 by bluepencil">
    <meta property="og:description" content="블루펜슬의 지극히 사적인 영화 감상 후기.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="映畵私論 by bluepencil">
    <meta name="twitter:description" content="블루펜슬의 지극히 사적인 영화 감상 후기.">
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-jp-dynamic-subset.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <header>
            <div class="header-title">
                <h1>映畵私論</h1>
                <p>블루펜슬의 지극히 사적인 영화 감상 후기.</p>
            </div>
            <img src="https://avatars.githubusercontent.com/u/20738199?v=4" alt="개인 로고" class="header-logo">
        </header>

        <section class="controls-wrapper">
            <div class="search-bar-container">
                <input type="search" id="search-box" placeholder="제목 또는 후기 내용으로 검색...">
            </div>

            <div class="filters-sort-row">
                <div class="rating-filter-container">
                    <div class="rating-label">별점 범위</div>
                    <div class="rating-tiles" id="rating-tiles">
                        <!-- Each tile visually represents 1 star, but has 2 clickable halves -->
                        <div class="tile-group" data-star="1">
                            <div class="tile-half tile-left" data-value="0.5"></div>
                            <div class="tile-half tile-right" data-value="1.0"></div>
                        </div>
                        <div class="tile-group" data-star="2">
                            <div class="tile-half tile-left" data-value="1.5"></div>
                            <div class="tile-half tile-right" data-value="2.0"></div>
                        </div>
                        <div class="tile-group" data-star="3">
                            <div class="tile-half tile-left" data-value="2.5"></div>
                            <div class="tile-half tile-right" data-value="3.0"></div>
                        </div>
                        <div class="tile-group" data-star="4">
                            <div class="tile-half tile-left" data-value="3.5"></div>
                            <div class="tile-half tile-right" data-value="4.0"></div>
                        </div>
                        <div class="tile-group" data-star="5">
                            <div class="tile-half tile-left" data-value="4.5"></div>
                            <div class="tile-half tile-right" data-value="5.0"></div>
                        </div>
                    </div>
                    <div class="rating-display" id="rating-display">전체 (0.0 ~ 5.0)</div>
                    <button id="reset-rating-btn" class="reset-btn" title="별점 필터 초기화">초기화</button>
                </div>

                <div class="sort-controls" id="sort-controls">
                    <span class="sort-label">정렬</span>
                    <button class="sort-btn active" data-sort="viewingDate" data-order="desc">
                        감상일 <span class="icon">▼</span>
                    </button>
                    <button class="sort-btn" data-sort="releaseDate" data-order="desc">
                        개봉일 <span class="icon">▼</span>
                    </button>
                    <button class="sort-btn" data-sort="rating" data-order="desc">
                        별점 <span class="icon">▼</span>
                    </button>
                    <button class="sort-btn" data-sort="name" data-order="asc">
                        이름 <span class="icon">▲</span>
                    </button>
                </div>
            </div>
        </section>

        <main>
            <section id="spotlight-container">
                <h2 class="section-title">스포트라이트</h2>
                <div id="spotlight-content" class="empty"></div>
            </section>

            <section>
                <h2 class="section-title">최근 후기 기록</h2>
                <div id="reviews-container"></div>
            </section>

            <div id="message-container"></div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
